services:
  dashboard:
    build: .
    image: energy-dashboard:latest
    container_name: energy-dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-8088}:8000"
    volumes:
      # Shared, writable data volume holding both the fingerprint library
      # (/data/fingerprints) and the editable plug-assignments store
      # (/data/assignments.json). Writable because the dashboard edits
      # assignments; calibrate.sh writes fingerprints into the same volume.
      - ${DATA_HOST_DIR:-./data}:/data
